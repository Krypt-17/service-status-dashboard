<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>FirstEnergy Mayfield Map</title>
  <style>
    :root {
      --bg: #050505;
      --row: #171717;
      --row-hover: #222222;
      --border: #2f2f2f;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --blue: #60a5fa;
      --green: #22c55e;
      --gray: #737373;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    .wrap {
      width: 100%;
      height: 100vh;
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      padding: 7px;
      background: var(--row);
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--gray);
      box-shadow: 0 0 7px rgba(115, 115, 115, 0.65);
      flex: 0 0 auto;
    }

    .title {
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .open {
      color: var(--blue);
      text-decoration: none;
      font-weight: bold;
      white-space: nowrap;
      font-size: 10px;
    }

    .open:hover {
      text-decoration: underline;
    }

    .mapbox {
      position: absolute;
      left: 0;
      right: 0;
      top: 31px;
      bottom: 0;
      overflow: hidden;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }

    .fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 16px;
      background: var(--bg);
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .fallback a {
      display: inline-block;
      margin-top: 10px;
      color: var(--blue);
      font-weight: bold;
      text-decoration: none;
    }

    .fallback a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="left">
        <span class="dot"></span>
        <span class="title">FirstEnergy Mayfield</span>
      </div>
      <a
        class="open"
        href="https://outages-oh.firstenergycorp.com/?address=Mayfield%20Heights%2C%20OH&gpsMarker=show&c=External_OH&o=View_by_Location"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open Map
      </a>
    </div>

    <div class="mapbox">
      <iframe
        id="feMap"
        src="https://outages-oh.firstenergycorp.com/?address=Mayfield%20Heights%2C%20OH&gpsMarker=show&c=External_OH&o=View_by_Location"
      ></iframe>

      <div class="fallback" id="fallback">
        <div>
          The FirstEnergy map may not allow embedded viewing.
          <br>
          Use the direct map link instead.
          <br>
          <a
            href="https://outages-oh.firstenergycorp.com/?address=Mayfield%20Heights%2C%20OH&gpsMarker=show&c=External_OH&o=View_by_Location"
            target="_blank"
            rel="noopener noreferrer"
          >
            Open FirstEnergy Mayfield Map
          </a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const fallback = document.getElementById("fallback");

    /*
      If the iframe is blocked by browser security headers, JavaScript usually
      cannot reliably detect it. This fallback appears after a short delay only
      as a practical safety net if the frame area looks useless.
    */
    setTimeout(function() {
      // Keep fallback hidden by default so we can visually test the iframe first.
      // Change this to "flex" manually if you want a permanent fallback card.
      // fallback.style.display = "flex";
    }, 4000);
  </script>
</body>
</html>
