<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Service Status Dashboard</title>
  <style>
    :root {
      --bg: #050505;
      --panel: #111111;
      --row: #171717;
      --row-hover: #222222;
      --border: #2f2f2f;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
      --gray: #737373;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .status-board {
      padding: 7px;
      background: var(--bg);
    }

    .header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
    }

    .service {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      min-height: 26px;
      padding: 5px 7px;
      background: var(--row);
      border: 1px solid var(--border);
      border-radius: 6px;
      text-decoration: none;
      color: var(--text);
      overflow: hidden;
    }

    .service:hover {
      background: var(--row-hover);
      border-color: #444444;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
      overflow: hidden;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: var(--gray);
      box-shadow: 0 0 7px rgba(115, 115, 115, 0.65);
    }

    .dot.ok {
      background: var(--green);
      box-shadow: 0 0 7px rgba(34, 197, 94, 0.75);
    }

    .dot.warn {
      background: var(--orange);
      box-shadow: 0 0 7px rgba(249, 115, 22, 0.75);
    }

    .dot.down {
      background: var(--red);
      box-shadow: 0 0 7px rgba(239, 68, 68, 0.75);
    }

    .dot.unknown {
      background: var(--gray);
      box-shadow: 0 0 7px rgba(115, 115, 115, 0.65);
    }

    .name {
      font-weight: bold;
      font-size: 11px;
      line-height: 1.1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .label {
      font-size: 9px;
      font-weight: bold;
      white-space: nowrap;
      color: var(--muted);
      flex: 0 0 auto;
    }

    .label.ok {
      color: var(--green);
    }

    .label.warn {
      color: var(--orange);
    }

    .label.down {
      color: var(--red);
    }

    .label.unknown {
      color: var(--muted);
    }

    .updated {
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
    }

    @media (max-width: 280px) {
      .grid {
        grid-template-columns: 1fr;
      }

      .label {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="status-board">
    <div class="header">Service Status</div>
    <div class="grid" id="statusBoard">Loading service status...</div>
    <div class="updated" id="lastUpdated"></div>
  </div>

  <script>
    const services = [
      {
        name: "Cloudflare",
        statusUrl: "https://www.cloudflarestatus.com/api/v2/summary.json",
        pageUrl: "https://www.cloudflarestatus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "GitHub",
        statusUrl: "https://www.githubstatus.com/api/v2/summary.json",
        pageUrl: "https://www.githubstatus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "Discord",
        statusUrl: "https://discordstatus.com/api/v2/summary.json",
        pageUrl: "https://discordstatus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "Duo",
        statusUrl: "https://status.duo.com/api/v2/summary.json",
        pageUrl: "https://status.duo.com/",
        type: "statuspage-incidents"
      },
      {
        name: "CodeTwo",
        statusUrl: "https://status.codetwo.com/api/v2/summary.json",
        pageUrl: "https://status.codetwo.com/",
        type: "statuspage-incidents"
      },
      {
        name: "CivicPlus",
        statusUrl: "https://status.civicplus.com/api/v2/summary.json",
        pageUrl: "https://status.civicplus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "Webroot",
        statusUrl: "",
        pageUrl: "https://status.webroot.com/",
        type: "link-only"
      }
    ];

    function normalizeStatus(service, data) {
      if (service.type === "link-only") {
        return {
          label: "Open",
          className: "unknown",
          title: "Open status page manually"
        };
      }

      if (service.type === "statuspage-incidents") {
        const incidents = Array.isArray(data.incidents) ? data.incidents : [];

        const activeIncidents = incidents.filter(function(incident) {
          const status = String(incident.status || "").toLowerCase();
          return status !== "resolved" && status !== "postmortem";
        });

        if (activeIncidents.length === 0) {
          return {
            label: "OK",
            className: "ok",
            title: "Operational"
          };
        }

        const hasCritical = activeIncidents.some(function(incident) {
          const impact = String(incident.impact || "").toLowerCase();
          const name = String(incident.name || "").toLowerCase();

          return (
            impact === "critical" ||
            impact === "major" ||
            name.includes("outage")
          );
        });

        if (hasCritical) {
          return {
            label: "Outage",
            className: "down",
            title: "Major outage"
          };
        }

        return {
          label: "Issue",
          className: "warn",
          title: "Official issue"
        };
      }

      return {
        label: "Unknown",
        className: "unknown",
        title: "Unknown status"
      };
    }

    async function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();

      const timeout = setTimeout(function() {
        controller.abort();
      }, timeoutMs);

      try {
        const separator = url.includes("?") ? "&" : "?";

        const response = await fetch(url + separator + "t=" + Date.now(), {
          cache: "no-store",
          signal: controller.signal
        });

        clearTimeout(timeout);

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        return await response.json();
      } catch (error) {
        clearTimeout(timeout);
        throw error;
      }
    }

    function createRow(service) {
      const row = document.createElement("a");
      row.className = "service";
      row.href = service.pageUrl;
      row.target = "_blank";
      row.rel = "noopener noreferrer";
      row.title = "Open status page for " + service.name;

      const left = document.createElement("div");
      left.className = "left";

      const dot = document.createElement("span");
      dot.className = "dot unknown";

      const name = document.createElement("span");
      name.className = "name";
      name.textContent = service.name;

      const label = document.createElement("span");
      label.className = "label unknown";
      label.textContent = "...";

      left.appendChild(dot);
      left.appendChild(name);

      row.appendChild(left);
      row.appendChild(label);

      return {
        row: row,
        dot: dot,
        label: label
      };
    }

    async function loadStatuses() {
      const board = document.getElementById("statusBoard");
      const lastUpdated = document.getElementById("lastUpdated");

      board.innerHTML = "";

      for (const service of services) {
        const parts = createRow(service);
        board.appendChild(parts.row);

        try {
          let status;

          if (!service.statusUrl) {
            status = normalizeStatus(service, {});
          } else {
            const data = await fetchWithTimeout(service.statusUrl, 8000);
            status = normalizeStatus(service, data);
          }

          parts.dot.className = "dot " + status.className;
          parts.label.className = "label " + status.className;
          parts.label.textContent = status.label;
          parts.row.title = service.name + ": " + status.title;
        } catch (error) {
          parts.dot.className = "dot unknown";
          parts.label.className = "label unknown";
          parts.label.textContent = "Open";
          parts.row.title = service.name + ": Unable to check automatically";
          console.log("Status check failed for " + service.name, error);
        }
      }

      lastUpdated.textContent = "Updated: " + new Date().toLocaleTimeString();
    }

    loadStatuses();
    setInterval(loadStatuses, 120000);
  </script>
</body>
</html>
