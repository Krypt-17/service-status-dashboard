<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Service Status Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    .status-board {
      padding: 7px;
    }

    .header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .service {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 5px 7px;
      margin-bottom: 5px;
      text-decoration: none;
      color: #f9fafb;
      min-height: 24px;
      box-sizing: border-box;
    }

    .service:hover {
      background: #273449;
      border-color: #4b5563;
    }

    .name {
      font-weight: bold;
      font-size: 12px;
      line-height: 1.1;
      padding-right: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 10px;
      font-weight: bold;
      white-space: nowrap;
      line-height: 1.1;
    }

    .ok {
      background: #166534;
      color: white;
    }

    .warn {
      background: #b45309;
      color: white;
    }

    .down {
      background: #991b1b;
      color: white;
    }

    .unknown {
      background: #4b5563;
      color: white;
    }

    .updated {
      margin-top: 6px;
      font-size: 10px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="status-board">
    <div class="header">Service Status</div>
    <div id="statusBoard">Loading service status...</div>
    <div class="updated" id="lastUpdated"></div>
  </div>

  <script>
    const services = [
      {
        name: "Cloudflare",
        statusUrl: "https://www.cloudflarestatus.com/api/v2/summary.json",
        pageUrl: "https://www.cloudflarestatus.com/",
        type: "statuspage"
      },
      {
        name: "GitHub",
        statusUrl: "https://www.githubstatus.com/api/v2/summary.json",
        pageUrl: "https://www.githubstatus.com/",
        type: "statuspage"
      },
      {
        name: "Discord",
        statusUrl: "https://discordstatus.com/api/v2/summary.json",
        pageUrl: "https://discordstatus.com/",
        type: "statuspage"
      },
      {
        name: "Duo",
        statusUrl: "https://status.duo.com/api/v2/summary.json",
        pageUrl: "https://status.duo.com/",
        type: "statuspage"
      },
      {
        name: "CodeTwo",
        statusUrl: "https://status.codetwo.com/api/v2/summary.json",
        pageUrl: "https://status.codetwo.com/",
        type: "statuspage"
      },
      {
        name: "CivicPlus",
        statusUrl: "https://status.civicplus.com/api/v2/summary.json",
        pageUrl: "https://status.civicplus.com/",
        type: "statuspage"
      },
      {
        name: "Webroot",
        statusUrl: "https://status.webroot.com/api/v2/summary.json",
        pageUrl: "https://status.webroot.com/",
        type: "statuspage"
      }
    ];

    function normalizeStatus(type, data) {
      let raw = "";

      if (type === "statuspage") {
        raw = String(data.status?.indicator || "").toLowerCase();
      }

      if (raw === "none") {
        return { label: "Operational", className: "ok" };
      }

      if (raw === "minor" || raw === "major") {
        return { label: "Official issue", className: "warn" };
      }

      if (raw === "critical") {
        return { label: "Major outage", className: "down" };
      }

      return { label: "Unknown", className: "unknown" };
    }

    async function loadStatuses() {
      const board = document.getElementById("statusBoard");
      const lastUpdated = document.getElementById("lastUpdated");

      board.innerHTML = "";

      for (const service of services) {
        const row = document.createElement("a");
        row.className = "service";
        row.href = service.pageUrl;
        row.target = "_blank";
        row.rel = "noopener noreferrer";
        row.title = "Open official status page for " + service.name;

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = service.name;

        const badge = document.createElement("div");
        badge.className = "badge unknown";
        badge.textContent = "Checking...";

        row.appendChild(name);
        row.appendChild(badge);
        board.appendChild(row);

        try {
          const response = await fetch(service.statusUrl + "?t=" + Date.now(), {
            cache: "no-store"
          });

          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const data = await response.json();
          const status = normalizeStatus(service.type, data);

          badge.textContent = status.label;
          badge.className = "badge " + status.className;
        } catch (error) {
          badge.textContent = "Check failed";
          badge.className = "badge unknown";
          console.log("Status check failed for " + service.name, error);
        }
      }

      lastUpdated.textContent = "Updated: " + new Date().toLocaleTimeString();
    }

    try {
      loadStatuses();
      setInterval(loadStatuses, 120000);
    } catch (error) {
      document.getElementById("statusBoard").innerHTML =
        '<div class="service"><div class="name">Script error</div><div class="badge down">Fix code</div></div>';
      console.log("Dashboard script error", error);
    }
  </script>
</body>
</html>
