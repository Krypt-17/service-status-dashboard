<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Service Status Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }

    .status-board {
      padding: 7px;
    }

    .header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .service {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 5px 7px;
      margin-bottom: 5px;
      text-decoration: none;
      color: #f9fafb;
      min-height: 24px;
      box-sizing: border-box;
    }

    .service:hover {
      background: #273449;
      border-color: #4b5563;
    }

    .name {
      font-weight: bold;
      font-size: 12px;
      line-height: 1.1;
      padding-right: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      border-radius: 999px;
      padding: 3px 7px;
      font-size: 10px;
      font-weight: bold;
      white-space: nowrap;
      line-height: 1.1;
    }

    .ok {
      background: #166534;
      color: white;
    }

    .warn {
      background: #b45309;
      color: white;
    }

    .down {
      background: #991b1b;
      color: white;
    }

    .unknown {
      background: #4b5563;
      color: white;
    }

    .updated {
      margin-top: 6px;
      font-size: 10px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="status-board">
    <div class="header">Service Status</div>
    <div id="statusBoard">Loading service status...</div>
    <div class="updated" id="lastUpdated"></div>
  </div>

  <script>
    const services = [
      {
        name: "Cloudflare",
        statusUrl: "https://www.cloudflarestatus.com/api/v2/summary.json",
        pageUrl: "https://www.cloudflarestatus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "GitHub",
        statusUrl: "https://www.githubstatus.com/api/v2/summary.json",
        pageUrl: "https://www.githubstatus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "Discord",
        statusUrl: "https://discordstatus.com/api/v2/summary.json",
        pageUrl: "https://discordstatus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "Duo",
        statusUrl: "https://status.duo.com/api/v2/summary.json",
        pageUrl: "https://status.duo.com/",
        type: "statuspage-incidents"
      },
      {
        name: "CodeTwo",
        statusUrl: "https://status.codetwo.com/api/v2/summary.json",
        pageUrl: "https://status.codetwo.com/",
        type: "statuspage-incidents"
      },
      {
        name: "CivicPlus",
        statusUrl: "https://status.civicplus.com/api/v2/summary.json",
        pageUrl: "https://status.civicplus.com/",
        type: "statuspage-incidents"
      },
      {
        name: "Webroot",
        statusUrl: "",
        pageUrl: "https://status.webroot.com/",
        type: "link-only"
      }
    ];

    function normalizeStatus(service, data) {
      if (service.type === "link-only") {
        return { label: "Open status", className: "unknown" };
      }

      if (service.type === "statuspage-incidents") {
        const incidents = Array.isArray(data.incidents) ? data.incidents : [];

        const activeIncidents = incidents.filter(function(incident) {
          const status = String(incident.status || "").toLowerCase();
          return status !== "resolved" && status !== "postmortem";
        });

        if (activeIncidents.length === 0) {
          return { label: "Operational", className: "ok" };
        }

        const hasCritical = activeIncidents.some(function(incident) {
          const impact = String(incident.impact || "").toLowerCase();
          const name = String(incident.name || "").toLowerCase();

          return (
            impact === "critical" ||
            impact === "major" ||
            name.includes("outage")
          );
        });

        if (hasCritical) {
          return { label: "Major outage", className: "down" };
        }

        return { label: "Official issue", className: "warn" };
      }

      return { label: "Unknown", className: "unknown" };
    }

    async function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timeout = setTimeout(function() {
        controller.abort();
      }, timeoutMs);

      try {
        const response = await fetch(url + "?t=" + Date.now(), {
          cache: "no-store",
          signal: controller.signal
        });

        clearTimeout(timeout);

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        return await response.json();
      } catch (error) {
        clearTimeout(timeout);
        throw error;
      }
    }

    async function loadStatuses() {
      const board = document.getElementById("statusBoard");
      const lastUpdated = document.getElementById("lastUpdated");

      board.innerHTML = "";

      for (const service of services) {
        const row = document.createElement("a");
        row.className = "service";
        row.href = service.pageUrl;
        row.target = "_blank";
        row.rel = "noopener noreferrer";
        row.title = "Open status page for " + service.name;

        const name = document.createElement("div");
        name.className = "name";
        name.textContent = service.name;

        const badge = document.createElement("div");
        badge.className = "badge unknown";
        badge.textContent = "Checking...";

        row.appendChild(name);
        row.appendChild(badge);
        board.appendChild(row);

        try {
          let status;

          if (!service.statusUrl) {
            status = normalizeStatus(service, {});
          } else {
            const data = await fetchWithTimeout(service.statusUrl, 8000);
            status = normalizeStatus(service, data);
          }

          badge.textContent = status.label;
          badge.className = "badge " + status.className;
        } catch (error) {
          badge.textContent = "Open status";
          badge.className = "badge unknown";
          console.log("Status check failed for " + service.name, error);
        }
      }

      lastUpdated.textContent = "Updated: " + new Date().toLocaleTimeString();
    }

    loadStatuses();
    setInterval(loadStatuses, 120000);
  </script>
</body>
</html>
