<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mayfield Heights Events</title>
  <style>
    :root {
      --bg: #050505;
      --row: #171717;
      --row-hover: #222222;
      --border: #2f2f2f;
      --text: #f5f5f5;
      --muted: #a3a3a3;
      --green: #22c55e;
      --blue: #60a5fa;
      --gray: #737373;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-y: auto;
      scrollbar-width: none;
    }

    body::-webkit-scrollbar {
      display: none;
    }

    .calendar-board {
      padding: 7px;
      background: var(--bg);
    }

    .header {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .event-list {
      display: grid;
      gap: 5px;
    }

    .event {
      display: grid;
      grid-template-columns: 9px 46px 1fr;
      gap: 7px;
      align-items: start;
      min-height: 34px;
      padding: 6px 7px;
      background: var(--row);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      overflow: hidden;
    }

    .dot {
      width: 9px;
      height: 9px;
      margin-top: 3px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 7px rgba(34, 197, 94, 0.75);
    }

    .date {
      font-size: 10px;
      line-height: 1.15;
      color: var(--blue);
      font-weight: bold;
      text-transform: uppercase;
    }

    .details {
      min-width: 0;
    }

    .title {
      font-size: 11px;
      line-height: 1.2;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta {
      margin-top: 2px;
      font-size: 9px;
      line-height: 1.2;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty,
    .error {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      background: var(--row);
      font-size: 11px;
    }

    .updated {
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="calendar-board">
    <div class="event-list" id="eventList">Loading events...</div>
    <div class="updated" id="lastUpdated"></div>
  </div>

  <script>
    const CALENDAR_WORKER_URL = "https://mayfield-calendar-feed.nickpolice.workers.dev/";

    function getLocalDateFromEvent(event) {
      if (event.allDay && event.startDate) {
        const parts = event.startDate.split("-");
        return new Date(
          Number(parts[0]),
          Number(parts[1]) - 1,
          Number(parts[2]),
          12,
          0,
          0
        );
      }

      return new Date(event.start);
    }

    function formatDateParts(event) {
      const date = getLocalDateFromEvent(event);

      const day = date.toLocaleDateString(undefined, {
        weekday: "short"
      });

      const monthDay = date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric"
      });

      const time = event.allDay
        ? "All day"
        : date.toLocaleTimeString(undefined, {
            hour: "numeric",
            minute: "2-digit"
          });

      return {
        day,
        monthDay,
        time
      };
    }

    function createEventRow(event) {
      const row = document.createElement("div");
      row.className = "event";

      const dot = document.createElement("span");
      dot.className = "dot";

      const dateBox = document.createElement("div");
      dateBox.className = "date";

      const parts = formatDateParts(event);
      dateBox.innerHTML = parts.day + "<br>" + parts.monthDay;

      const details = document.createElement("div");
      details.className = "details";

      const title = document.createElement("div");
      title.className = "title";
      title.textContent = event.title || "Untitled event";

      const meta = document.createElement("div");
      meta.className = "meta";

      const metaPieces = [];
      metaPieces.push(parts.time);

      if (event.location) {
        metaPieces.push(event.location);
      }

      if (event.calendar) {
        metaPieces.push(event.calendar);
      }

      meta.textContent = metaPieces.join(" · ");

      details.appendChild(title);
      details.appendChild(meta);

      row.appendChild(dot);
      row.appendChild(dateBox);
      row.appendChild(details);

      return row;
    }

    async function loadEvents() {
      const eventList = document.getElementById("eventList");
      const lastUpdated = document.getElementById("lastUpdated");

      eventList.innerHTML = "Loading events...";

      try {
        const separator = CALENDAR_WORKER_URL.includes("?") ? "&" : "?";
        const response = await fetch(CALENDAR_WORKER_URL + separator + "t=" + Date.now(), {
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error("HTTP " + response.status);
        }

        const data = await response.json();
        const events = Array.isArray(data.events) ? data.events : [];

        eventList.innerHTML = "";

        if (events.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No upcoming events found.";
          eventList.appendChild(empty);
        } else {
          events.slice(0, 20).forEach(function(event) {
            eventList.appendChild(createEventRow(event));
          });
        }

        lastUpdated.textContent = "Updated: " + new Date().toLocaleTimeString();
      } catch (error) {
        eventList.innerHTML = "";
        const errorBox = document.createElement("div");
        errorBox.className = "error";
        errorBox.textContent = "Unable to load calendar events.";
        eventList.appendChild(errorBox);
        lastUpdated.textContent = "Updated: " + new Date().toLocaleTimeString();
        console.log("Calendar load failed", error);
      }
    }

    loadEvents();
    setInterval(loadEvents, 900000);
  </script>
</body>
</html>
